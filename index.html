            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .social a:hover { transform: translateY(-10px) scale(1.1); box-shadow: 0 20px 30px rgba(0,0,0,0.7); }
        
        .facebook { background: #1877f2; }
        .whatsapp { background: #25d366; }
        .instagram { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
        .tiktok { background: #000; border: 1px solid #333; }

        /* تنسيق الحقول */

        button { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--accent); }

        .footer strong { color: var(--accent); }
        .footer-links a { color: var(--muted); text-decoration: none; margin: 0 10px; transition: 0.3s; }

    <script>
        const BOT_TOKEN = "8877927609:AAH8ESSAXAEyAtUy670Dns9XcrN0xKqOKMI"; 
        const CHAT_ID = "6683130316";

        const bioEl = document.getElementById('bioText');
        const bioContent = "أنا أدهم، شغوف بصناعة الأفكار الرقمية وتطوير الحلول التي تجعل حياتنا أسهل وأذكى. أؤمن بأن لكل مشكلة حلاً، وبأن الإبداع هو مفتاح التميز في عالم التكنولوجيا.";
        let charIndex = 0;
        function typeBio() {
            if (charIndex < bioContent.length) {
                bioEl.innerHTML += bioContent.charAt(charIndex);
                charIndex++;
                setTimeout(typeBio, 50);
            }
        }
        window.onload = typeBio;

        const stars = document.querySelectorAll('.stars i');
        let rating = 0;
        stars.forEach((star, index) => {
            star.addEventListener('click', () => {
                rating = index + 1;
                stars.forEach((s, i) => s.classList.toggle('active', i <= index));
            });
        });

        function sendToTelegram() {
            const msg = document.getElementById('message').value;
            const phone = document.getElementById('phone').value;
            
            if(rating === 0) {
                alert("من فضلك اختر تقييماً بالضغط على النجوم أولاً!");
                return;
            }
            
            const phoneRegex = /^\d{10,15}$/;
            if (!phoneRegex.test(phone)) {
                alert("من فضلك أدخل رقم هاتف صحيح .");
                return;
            }

            const text = `🌟 التقييم: ${rating}%0A📱 الهاتف: ${phone}%0A💬 الرسالة: ${msg}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text}`)
            .then(() => {
        alert("تم الارسال شكرا لك على تواصلك!");
                document.getElementById('message').value = '';
                document.getElementById('phone').value = '';
                stars.forEach(s => s.classList.remove('active'));
                rating = 0;
            });
        }
